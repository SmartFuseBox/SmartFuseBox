name: Release SmartFuseBox Firmware

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  
jobs:
  build-and-release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        board:
          - { name: "esp32", fqbn: "esp32:esp32:esp32" }
          - { name: "esp32s3", fqbn: "esp32:esp32:esp32s3" }

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Arduino CLI
      uses: arduino/setup-arduino-cli@v1

    - name: Configure Arduino CLI
      run: |
        arduino-cli config init
        arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32

    - name: Generate FirmwareVersion.h
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$VERSION"
        cat <<EOF > SmartFuseBox/FirmwareVersion.h
        #pragma once
        #include <Arduino.h>
        constexpr uint8_t FirmwareMajor = ${MAJOR};
        constexpr uint8_t FirmwareMinor = ${MINOR};
        constexpr uint8_t FirmwarePatch = ${PATCH};
        constexpr uint8_t FirmwareBuild = ${BUILD};
        EOF

    - name: Compile SmartFuseBox firmware
      run: |
        arduino-cli compile \
          --fqbn ${{ matrix.board.fqbn }} \
          --output-dir SmartFuseBox/build/${{ matrix.board.name }} \
          SmartFuseBox

    - name: Generate checksum
      run: |
        sha256sum SmartFuseBox/build/${{ matrix.board.name }}/SmartFuseBox.ino.bin | awk '{print $1}' > checksum-${{ matrix.board.name }}.sha256

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          SmartFuseBox/build/${{ matrix.board.name }}/SmartFuseBox.ino.bin#SmartFuseBox-${{ matrix.board.name }}.bin
          checksum-${{ matrix.board.name }}.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
